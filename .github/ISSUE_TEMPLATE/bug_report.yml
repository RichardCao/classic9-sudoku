name: Bug 报告
description: 报告解析、校验、求解、评分、生成或 CLI 的普通问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及你期望发生什么。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 最小复现
      description: 提供最小代码、CLI 命令或输入题面。
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: classic9 版本
      placeholder: "0.5.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js 版本
      placeholder: "node -v"
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 包管理器、操作系统、相关日志或截图。
